<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Diji Önizleme</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0c1322; color: #fff; font-family: system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 24px; gap: 18px; min-height: 100vh; }
    h1 { font-size: 1.4rem; color: #60c8ff; }
    .controls { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
    button {
      padding: 7px 13px; border: 1px solid #2a3a5c; background: #16213a;
      color: #cfe; border-radius: 999px; cursor: pointer; font-size: 0.82rem;
      transition: all 0.15s;
    }
    button.active { background: #1e6fff; border-color: #60c8ff; color: #fff; }
    button:hover:not(.active) { background: #1d2b48; border-color: #3a4a6c; }
    #viewer { width: 460px; height: 640px; border: 1px solid #1e2c45; border-radius: 16px; overflow: hidden; background: linear-gradient(135deg, #1a2540, #0c1322); }
    .info { color: #6a85a8; font-size: 0.78rem; }
    .group { display: flex; flex-direction: column; gap: 6px; align-items: center; }
    .group-label { font-size: 0.7rem; color: #6a85a8; text-transform: uppercase; letter-spacing: 0.05em; }
  </style>
</head>
<body>
  <h1>Diji Karakter Önizleme</h1>

  <div class="group">
    <div class="group-label">Bekleme</div>
    <div class="controls">
      <button data-anim="idle" class="active">Idle</button>
      <button data-anim="happy">Mutlu</button>
      <button data-anim="thinking">Düşünme</button>
      <button data-anim="look">Bakınma</button>
    </div>
  </div>

  <div class="group">
    <div class="group-label">Hareket</div>
    <div class="controls">
      <button data-anim="walk">Yürüyüş</button>
      <button data-anim="run">Koşu</button>
    </div>
  </div>

  <div class="group">
    <div class="group-label">Konuşma</div>
    <div class="controls">
      <button data-anim="talk">Konuşma 1</button>
      <button data-anim="talk2">Konuşma 2</button>
      <button data-anim="talk3">Konuşma 3</button>
    </div>
  </div>

  <div class="group">
    <div class="group-label">Jest & Reaksiyon</div>
    <div class="controls">
      <button data-anim="point">İşaret</button>
      <button data-anim="wave">El Salla</button>
      <button data-anim="nod">Onay</button>
      <button data-anim="shake">Red</button>
      <button data-anim="shrug">Bilmem</button>
      <button data-anim="clap">Alkış</button>
      <button data-anim="surprised">Şaşkın</button>
      <button data-anim="yell">Bağırma</button>
      <button data-anim="bow">Reverans</button>
    </div>
  </div>

  <div id="viewer"></div>
  <p class="info">Fare ile döndür • Tekerlek ile zoom</p>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const W = 460, H = 640;
    const container = document.getElementById('viewer');
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(W, H);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    container.appendChild(renderer.domElement);

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(35, W/H, 0.1, 100);
    camera.position.set(0, 1.2, 4.5);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0.9, 0);
    controls.enableDamping = true;
    controls.update();

    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const key = new THREE.DirectionalLight(0xffffff, 1.5);
    key.position.set(2, 4, 3);
    scene.add(key);
    const fill = new THREE.DirectionalLight(0x88aaff, 0.6);
    fill.position.set(-2, 2, 1);
    scene.add(fill);
    const rim = new THREE.DirectionalLight(0xffaa66, 0.4);
    rim.position.set(0, 1, -3);
    scene.add(rim);

    let baseModel = null;
    let mixer = null;
    let currentAction = null;
    const clipsCache = {};
    const loader = new GLTFLoader();

    function loadGLB(path) {
      return new Promise((resolve, reject) => {
        loader.load(path, resolve, undefined, reject);
      });
    }

    async function init() {
      const idle = await loadGLB('assets/characters/animations/idle.glb');
      baseModel = idle.scene;

      const box = new THREE.Box3().setFromObject(baseModel);
      const h = box.max.y - box.min.y;
      const k = 1.7 / h;
      baseModel.scale.setScalar(k);
      baseModel.position.set(0, -box.min.y * k, 0);

      scene.add(baseModel);
      mixer = new THREE.AnimationMixer(baseModel);
      clipsCache.idle = idle.animations[0];
      play('idle');
    }

    async function play(anim) {
      document.querySelectorAll('button').forEach(b => b.classList.toggle('active', b.dataset.anim === anim));

      if (!clipsCache[anim]) {
        try {
          const path = `assets/characters/animations/${anim}.glb`;
          const gltf = await loadGLB(path);
          clipsCache[anim] = gltf.animations[0];
        } catch (e) { console.error('Yükleme hatası:', e); return; }
      }
      const clip = clipsCache[anim];
      if (!clip) return;

      const action = mixer.clipAction(clip);
      action.reset().setEffectiveWeight(1).play();
      if (currentAction && currentAction !== action) {
        currentAction.fadeOut(0.3);
        action.fadeIn(0.3);
      }
      currentAction = action;
    }

    document.querySelectorAll('button[data-anim]').forEach(btn => {
      btn.addEventListener('click', () => play(btn.dataset.anim));
    });

    init();

    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      if (mixer) mixer.update(clock.getDelta());
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
